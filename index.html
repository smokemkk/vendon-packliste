<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Packliste L 2026-07-10</title>
<style>
:root { --bg:#101418; --card:#1b222b; --fg:#f2f5f8; --dim:#8fa0b0; --acc:#33b5ff; --ok:#2ecc71; --warn:#f5a623; --line:#2a3542; }
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { margin:0; background:var(--bg); color:var(--fg); font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; }
body { padding-bottom:132px; }
header { position:sticky; top:0; z-index:5; background:var(--bg); padding:8px 10px 6px; border-bottom:1px solid var(--line); }
.tourrow { display:flex; justify-content:space-between; align-items:baseline; }
.tour { font-size:15px; font-weight:700; color:var(--acc); }
.prog { font-size:14px; color:var(--dim); font-variant-numeric:tabular-nums; }
.prog b { color:var(--ok); } .prog i { color:var(--warn); font-style:normal; }
.tabs { display:flex; gap:6px; overflow-x:auto; padding:8px 0 4px; scrollbar-width:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab { flex:0 0 auto; padding:9px 13px; border-radius:20px; background:var(--card); color:var(--dim); font-size:14px; font-weight:600; border:1px solid var(--line); }
.tab.act { background:var(--acc); color:#04283d; border-color:var(--acc); }
.tab.done { color:var(--ok); border-color:var(--ok); }
.tab.warn { color:var(--warn); border-color:var(--warn); }
.tab.warn.act { background:var(--warn); color:#3a2a00; }
.bar { height:5px; background:var(--card); border-radius:3px; overflow:hidden; margin-top:4px; }
.bar>div { height:100%; background:var(--ok); width:0%; transition:width .25s; }
.now { margin:10px; padding:14px 14px 12px; background:var(--card); border:2px solid var(--acc); border-radius:16px; }
.now .lbl { font-size:12px; letter-spacing:1.5px; color:var(--acc); font-weight:700; }
.nowrow { display:flex; align-items:center; gap:14px; margin-top:6px; }
.nowsel { font-size:56px; font-weight:800; line-height:1; font-variant-numeric:tabular-nums; min-width:92px; }
.nowqty { font-size:46px; font-weight:800; color:var(--ok); margin-left:auto; white-space:nowrap; }
.nowname { font-size:19px; font-weight:600; margin-top:8px; line-height:1.3; }
.nowart { font-size:12px; color:var(--dim); margin-top:3px; }
.btnrow { display:flex; gap:10px; margin-top:12px; }
.nowbtn { flex:3; padding:15px 8px; font-size:19px; font-weight:800; border:0; border-radius:12px; background:var(--ok); color:#03210f; }
.missbtn { flex:2; padding:15px 8px; font-size:15px; font-weight:800; border:0; border-radius:12px; background:#3a2f14; color:var(--warn); border:1.5px solid var(--warn); }
.alldone { margin:10px; padding:20px; text-align:center; background:var(--card); border:2px solid var(--ok); border-radius:16px; font-size:20px; font-weight:800; color:var(--ok); }
.alldone.w { border-color:var(--warn); color:var(--warn); font-size:17px; }
ul { list-style:none; margin:4px 10px; padding:0; }
li { display:flex; align-items:center; gap:11px; padding:13px 11px; border-bottom:1px solid var(--line); font-size:16px; position:relative; }
li .sel { font-size:23px; font-weight:800; min-width:58px; font-variant-numeric:tabular-nums; }
li .nm { flex:1; line-height:1.25; }
li .art { display:block; font-size:11px; color:var(--dim); }
li .qty { font-size:23px; font-weight:800; color:var(--ok); white-space:nowrap; }
li.done { opacity:.38; }
li.done .nm, li.done .sel { text-decoration:line-through; }
li.miss { background:#2a2210; }
li.miss .qty { color:var(--warn); }
li .box { width:26px; height:26px; border:2px solid var(--dim); border-radius:7px; flex:0 0 auto; display:flex; align-items:center; justify-content:center; font-weight:800; color:#03210f; }
li.done .box { background:var(--ok); border-color:var(--ok); }
li.miss .box { background:var(--warn); border-color:var(--warn); color:#3a2a00; }
li .xbtn { flex:0 0 auto; padding:8px 10px; font-size:13px; font-weight:800; color:var(--warn); background:transparent; border:1.5px solid var(--warn); border-radius:9px; }
h3 { margin:16px 12px 2px; font-size:13px; color:var(--dim); letter-spacing:1px; text-transform:uppercase; }
h3.warn { color:var(--warn); }
.mgroup { margin:14px 12px 4px; font-size:14px; font-weight:700; color:var(--acc); }
.hint { margin:8px 12px 16px; font-size:13px; color:var(--dim); line-height:1.4; }
.next { position:fixed; left:0; right:0; bottom:0; z-index:6; background:linear-gradient(#141a21f2,#141a21); border-top:1px solid var(--line); padding:7px 10px 10px; display:flex; gap:12px; align-items:stretch; }
.undo { flex:0 0 auto; align-self:center; padding:13px 14px; font-size:15px; font-weight:800; border-radius:12px; border:1.5px solid var(--dim); background:var(--card); color:var(--fg); }
.undo:disabled { opacity:.35; }
.vbtns { display:flex; gap:7px; align-items:center; }
.vbtn { padding:7px 11px; font-size:17px; border-radius:11px; border:1.5px solid var(--line); background:var(--card); }
.vbtn.on { border-color:var(--ok); background:#12331f; }
.vbtn.mic.on { border-color:#ff5a5a; background:#3a1414; animation:pulse 1.4s infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 #ff5a5a55} 50%{box-shadow:0 0 0 7px #ff5a5a00} }
.heard { font-size:11px; color:var(--dim); max-width:46vw; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.nx { flex:1; min-width:0; }
.nx .lbl { font-size:11px; letter-spacing:1.5px; color:var(--dim); font-weight:700; }
.nrow { display:flex; align-items:center; gap:10px; padding:4px 2px 0; font-size:14px; color:var(--dim); }
.nrow b { color:var(--fg); font-size:17px; min-width:44px; font-variant-numeric:tabular-nums; }
.nrow .q { margin-left:auto; color:var(--ok); font-weight:700; font-size:16px; white-space:nowrap; }
.nrow .n { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

#pinov { position:fixed; inset:0; z-index:99; display:none; align-items:center; justify-content:center; background:var(--bg); }
.pinbox { width:min(86vw,340px); background:var(--card); border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; }
.pinbox h2 { margin:0 0 4px; font-size:19px; }
.pinbox p { margin:0 0 14px; font-size:13px; color:var(--dim); }
.pinbox input { width:100%; padding:14px; font-size:26px; text-align:center; letter-spacing:6px; border-radius:11px; border:1.5px solid var(--line); background:var(--bg); color:var(--fg); font-variant-numeric:tabular-nums; }
.pinbox button { width:100%; margin-top:12px; padding:14px; font-size:17px; font-weight:800; border:0; border-radius:11px; background:var(--acc); color:#04283d; }
#pinmsg { min-height:18px; margin-top:9px; font-size:13px; color:var(--warn); }
</style>
</head>
<body>
<div id="pinov"><div class="pinbox"><h2>📦 OMS Packliste</h2><p>Bitte PIN eingeben (einmalig)</p>
<input id="pin" inputmode="numeric" autocomplete="off" placeholder="••••••">
<button onclick="pinGo()">Öffnen</button><div id="pinmsg"></div></div></div>
<header>
  <div class="tourrow"><span class="tour">📦 Packliste L · 2026-07-10</span>
    <span class="vbtns"><span class="heard" id="heard"></span><button class="vbtn" id="vb" onclick="toggleVoice()">🔊</button><button class="vbtn mic" id="mb" onclick="toggleMic()">🎤</button></span></div>
  <div class="tourrow"><span></span><span class="prog" id="prog"></span></div>
  <div class="tabs" id="tabs"></div>
  <div class="bar"><div id="bar"></div></div>
</header>
<div id="main"></div>
<div class="next"><button class="undo" id="undo" onclick="undo()">↩ Zurück</button><div class="nx" id="nx"></div></div>
<script>
const LS=(()=>{try{localStorage.setItem('__t','1');localStorage.removeItem('__t');return localStorage;}catch(e){const m={};return{getItem:k=>(k in m?m[k]:null),setItem:(k,v)=>{m[k]=String(v);},clear:()=>{for(const k in m)delete m[k];}};}})();
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function deriveKey(pin, salt) {
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pin), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:200000, hash:'SHA-256'}, km, {name:'AES-GCM', length:256}, false, ['decrypt']);
}
async function tryPin(pin) {
  const r = await fetch('data.enc.json?t=' + Date.now(), {cache:'no-store'});
  if (!r.ok) throw new Error('load');
  const enc = await r.json();
  const key = await deriveKey(pin, b64(enc.salt));
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(enc.iv)}, key, b64(enc.data));
  return JSON.parse(new TextDecoder().decode(pt));
}
window.pinGo = async () => {
  const pin = document.getElementById('pin').value.trim();
  const msg = document.getElementById('pinmsg');
  msg.textContent = 'Prüfe …';
  try { const d = await tryPin(pin); LS.setItem('packliste_pin', pin); document.getElementById('pinov').remove(); startApp(d); }
  catch(e) { msg.textContent = 'PIN falsch oder Daten nicht erreichbar.'; }
};
document.addEventListener('keydown', e => { if (e.key === 'Enter' && document.getElementById('pinov')) pinGo(); });
(async () => {
  const saved = LS.getItem('packliste_pin');
  if (saved) { try { const d = await tryPin(saved); document.getElementById('pinov').remove(); startApp(d); return; } catch(e){} }
  document.getElementById('pinov').style.display = 'flex';
})();
function startApp(DATA) {
const KEY = 'packliste_' + DATA.datum + '_' + DATA.tour;
let state = JSON.parse(LS.getItem(KEY) || '{"items":{},"hist":[],"tab":0}');
if (!state.items) state = {items:{},hist:[],tab:0};
const FEHLT = DATA.machines.length; // Index des Fehlt-Tabs
const save = () => LS.setItem(KEY, JSON.stringify(state));
const k = (m,it) => m.device + '_' + it.id;
const selTxt = it => it.sel.join('+') || '–';
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const st = key => state.items[key] || 0;   // 0=offen, 1=gepackt, 2=nicht vorraetig
const rest = m => m.items.filter(it => !st(k(m,it))).length;
const missCount = () => DATA.machines.reduce((n,m) => n + m.items.filter(it => st(k(m,it))===2).length, 0);

function row(m, it, cls, boxTxt, withX) {
  const key = k(m,it);
  const x = withX ? `<button class="xbtn" onclick="event.stopPropagation();mark('${key}',2)">✗ fehlt</button>` : '';
  return `<li class="${cls}" onclick="mark('${key}',${cls?0:1})"><span class="box">${boxTxt}</span><span class="sel">${selTxt(it)}</span><span class="nm">${esc(it.name)}<span class="art">${esc(it.art)}</span></span>${x}<span class="qty">× ${it.qty}</span></li>`;
}

function render() {
  const tabsEl = document.getElementById('tabs');
  const mc = missCount();
  tabsEl.innerHTML = DATA.machines.map((mm,i) => {
    const r = rest(mm);
    const cls = 'tab' + (i===state.tab?' act':'') + (r===0?' done':'');
    return `<div class="${cls}" onclick="go(${i})">${i+1}·${esc(mm.label)}${r===0?' ✓':' ('+r+')'}</div>`;
  }).join('') + `<div class="tab warn${state.tab===FEHLT?' act':''}" onclick="go(${FEHLT})">⚠ Fehlt (${mc})</div>`;

  const allT = DATA.machines.reduce((n,m)=>n+m.items.length,0);
  const allP = DATA.machines.reduce((n,m)=>n+m.items.filter(it=>st(k(m,it))===1).length,0);
  document.getElementById('prog').innerHTML = `<b>${allP} ✓</b>${mc?` · <i>${mc} ⚠</i>`:''} · ${allT-allP-mc} offen`;
  document.getElementById('bar').style.width = allT ? ((allP+mc)/allT*100)+'%' : '100%';
  document.getElementById('undo').disabled = !state.hist.length;

  let h = '';
  if (state.tab === FEHLT) {
    // Fehlt-Uebersicht ueber alle Kisten
    let any = false;
    h += '<h3 class="warn">Nicht vorrätig – bitte melden / in Vendon korrigieren</h3>';
    DATA.machines.forEach((m,i) => {
      const miss = m.items.filter(it => st(k(m,it))===2);
      if (miss.length) {
        any = true;
        h += `<div class="mgroup">Kiste ${i+1} · ${esc(m.label)}</div><ul>` +
             miss.map(it => row(m,it,'miss','!',false)).join('') + '</ul>';
      }
    });
    h += any
      ? '<div class="hint">Diese Positionen sind in Vendon bereits als aufgefüllt gebucht, wurden aber nicht gepackt. Bitte an Omar melden, damit der Bestand korrigiert wird. Antippen macht die Markierung rückgängig.</div>'
      : '<div class="alldone">✅ Nichts fehlt!</div>';
  } else {
    const m = DATA.machines[state.tab];
    const open = m.items.filter(it => !st(k(m,it)));
    const miss = m.items.filter(it => st(k(m,it))===2);
    const done = m.items.filter(it => st(k(m,it))===1);
    if (open.length) {
      const it = open[0], key = k(m,it);
      h += `<div class="now"><div class="lbl">JETZT PACKEN · KISTE ${state.tab+1} ${esc(m.label).toUpperCase()}</div>
        <div class="nowrow"><span class="nowsel">${selTxt(it)}</span><span class="nowqty">× ${it.qty}</span></div>
        <div class="nowname">${esc(it.name)}</div><div class="nowart">${esc(it.art)}</div>
        <div class="btnrow"><button class="nowbtn" onclick="mark('${key}',1)">✓ Gepackt</button><button class="missbtn" onclick="mark('${key}',2)">✗ Nicht vorrätig</button></div></div>`;
    } else {
      h += miss.length
        ? `<div class="alldone w">⚠ Kiste ${state.tab+1} fertig – ${miss.length} Position(en) nicht vorrätig (siehe „Fehlt")</div>`
        : `<div class="alldone">✅ Kiste ${state.tab+1} „${esc(m.label)}" komplett!</div>`;
    }
    if (open.length > 1)
      h += '<h3>Noch offen</h3><ul>' + open.slice(1).map(it => row(m,it,'','',true)).join('') + '</ul>';
    if (miss.length)
      h += '<h3 class="warn">Nicht vorrätig</h3><ul>' + miss.map(it => row(m,it,'miss','!',false)).join('') + '</ul>';
    if (done.length)
      h += '<h3>Gepackt</h3><ul>' + done.map(it => row(m,it,'done','✓',false)).join('') + '</ul>';
  }
  document.getElementById('main').innerHTML = h;

  // Vorschau unten: die naechsten 3 nach der aktuellen Position (nur auf Kisten-Tabs)
  let nh = '';
  if (state.tab !== FEHLT) {
    const m = DATA.machines[state.tab];
    const open = m.items.filter(it => !st(k(m,it)));
    const nx = open.slice(1,4);
    nh = nx.length
      ? '<div class="lbl">DANACH</div>' + nx.map(it => `<div class="nrow"><b>${selTxt(it)}</b><span class="n">${esc(it.name)}</span><span class="q">× ${it.qty}</span></div>`).join('')
      : (open.length ? '<div class="lbl">DANACH</div><div class="nrow"><span class="n">— letzte Position dieser Kiste —</span></div>' : '<div class="lbl">KISTE FERTIG 🎉</div>');
  } else {
    nh = '<div class="lbl">FEHLT-ÜBERSICHT</div>';
  }
  document.getElementById('nx').innerHTML = nh;
  save();
  window.scrollTo(0,0);
}
window.go = i => { state.tab = i; render(); announce(); };
window.mark = (key, val) => {
  const prev = st(key);
  if (val === 0) { delete state.items[key]; }
  else { state.items[key] = val; }
  state.hist.push({key, prev});
  if (state.hist.length > 200) state.hist.shift();
  render();
  if (navigator.vibrate) navigator.vibrate(val===2 ? [40,60,40] : 30);
  announce(val===2 ? 'Als fehlend markiert. ' : '');
};
window.undo = () => {
  const a = state.hist.pop();
  if (!a) return;
  if (a.prev === 0) delete state.items[a.key]; else state.items[a.key] = a.prev;
  render();
  if (navigator.vibrate) navigator.vibrate(15);
  announce('Zurückgenommen. ');
};

// ---- Sprachausgabe (Vorlesen) ----
let voiceOn = !!state.voiceOn, micOn = false, recog = null, speaking = false;
const synth = window.speechSynthesis;
function speak(txt) {
  if (!voiceOn || !synth) return;
  try {
    if (recog) { try { recog.abort(); } catch(e){} }   // nicht die eigene Ansage "hoeren"
    speaking = true;
    synth.cancel();
    const u = new SpeechSynthesisUtterance(txt);
    u.lang = 'de-DE'; u.rate = 1.25;
    u.onend = u.onerror = () => { speaking = false; if (micOn) startRecog(); };
    synth.speak(u);
  } catch(e) { speaking = false; }
}
const sprich = it => it.qty + ' mal ' + it.name.replace(/\(.*?\)/g, ' ').replace(/\s+/g, ' ').trim();
function announce(prefix) {
  if (!voiceOn || state.tab === FEHLT) return;
  const m = DATA.machines[state.tab];
  const open = m.items.filter(it => !st(k(m,it)));
  speak((prefix||'') + (open.length ? sprich(open[0]) : 'Kiste ' + (state.tab+1) + ' fertig.'));
}
window.toggleVoice = () => {
  voiceOn = !voiceOn; state.voiceOn = voiceOn; save(); updVB();
  if (voiceOn) announce('Vorlesen an. '); else if (synth) synth.cancel();
};

// ---- Spracheingabe (Mikro) ----
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
function startRecog() {
  if (!SR || !micOn) return;
  try {
    recog = new SR();
    recog.lang = 'de-DE'; recog.continuous = true; recog.interimResults = false;
    recog.onresult = ev => {
      if (speaking) return;
      const t = ev.results[ev.results.length-1][0].transcript.toLowerCase().trim();
      document.getElementById('heard').textContent = '„' + t + '"';
      handleVoice(t);
    };
    recog.onend = () => { if (micOn && !speaking) { try { recog.start(); } catch(e){} } };
    recog.onerror = e => {
      if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
        micOn = false; updVB();
        document.getElementById('heard').textContent = 'Mikrofon nicht erlaubt';
      }
    };
    recog.start();
  } catch(e){}
}
function handleVoice(t) {
  if (state.tab === FEHLT) { if (/zurück/.test(t)) undo(); return; }
  const m = DATA.machines[state.tab];
  const open = m.items.filter(it => !st(k(m,it)));
  if (/zurück|rückgängig/.test(t)) undo();
  else if (/fehlt|nicht da|nicht vorrätig|nicht verfügbar|leer/.test(t)) { if (open.length) mark(k(m,open[0]),2); }
  else if (/gepackt|weiter|okay|erledigt|\bok\b|hab ich/.test(t)) { if (open.length) mark(k(m,open[0]),1); }
  else if (/wiederhol|noch ?mal|was war das/.test(t)) announce();
  else if (/nächste kiste/.test(t)) { if (state.tab < DATA.machines.length-1) go(state.tab+1); }
}
window.toggleMic = () => {
  const heard = document.getElementById('heard');
  if (!SR) { heard.textContent = 'Spracherkennung hier nicht verfügbar'; return; }
  if (!window.isSecureContext) { heard.textContent = 'Mikro braucht HTTPS-Seite'; return; }
  micOn = !micOn; updVB();
  if (micOn) {
    if (!voiceOn) { voiceOn = true; state.voiceOn = true; save(); }
    heard.textContent = 'Höre zu … („gepackt", „fehlt", „zurück")';
    startRecog(); updVB();
  } else { heard.textContent = ''; if (recog) { try { recog.abort(); } catch(e){} } }
};
function updVB() {
  document.getElementById('vb').className = 'vbtn' + (voiceOn ? ' on' : '');
  document.getElementById('mb').className = 'vbtn mic' + (micOn ? ' on' : '');
}
updVB();

if ('wakeLock' in navigator) { const wl = () => navigator.wakeLock.request('screen').catch(()=>{}); wl(); document.addEventListener('visibilitychange', () => { if (!document.hidden) wl(); }); }
render();
}
</script>
</body>
</html>
