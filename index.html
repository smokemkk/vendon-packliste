<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OMS Packlisten</title>
<style>
:root { --bg:#101418; --card:#1b222b; --fg:#f2f5f8; --dim:#8fa0b0; --acc:#33b5ff; --line:#2a3542; }
* { box-sizing:border-box; }
body { margin:0; background:var(--bg); color:var(--fg); font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; padding:18px 14px; }
h1 { font-size:20px; color:var(--acc); margin:6px 2px 16px; }
a { display:flex; justify-content:space-between; align-items:center; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:17px 16px; margin-bottom:10px; color:var(--fg); text-decoration:none; font-size:18px; font-weight:700; }
a span { color:var(--dim); font-size:14px; font-weight:500; }
p { color:var(--dim); font-size:13px; margin-top:18px; line-height:1.5; }
</style>
</head>
<body>
<h1>&#128230; OMS Packlisten</h1>
<a href="sl/">SL Tour<span>Donnerstag</span></a>
<a href="b/">B Tour<span>Donnerstag</span></a>
<a href="l/">L Tour<span>Freitag</span></a>
<a href="sl2/">SL 2 Tour<span>Sonntag</span></a>
<a href="l2/">L2 Tour<span>Sonntag</span></a>
<a href="b2/">B2 Tour<span>Montag</span></a>
<a href="h/">H Tour<span>Mittwoch</span></a>
<p>Tipp: Die Tour-Seite als Homescreen-Icon ablegen. PIN wird nur einmal je Ger&auml;t ben&ouml;tigt.</p>
</body>
</html>
